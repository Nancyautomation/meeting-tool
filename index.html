<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Actio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e0c; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #e8e6df; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 0.5px solid #2a2a26; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 28px; height: 28px; background: #c8f060; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-name { font-size: 16px; font-weight: 500; letter-spacing: -0.3px; color: #e8e6df; }
  .logo-badge { font-size: 11px; background: #1e1e1a; border: 0.5px solid #2e2e2a; color: #888780; padding: 2px 8px; border-radius: 4px; }
  .hero { padding: 64px 32px 40px; max-width: 640px; }
  .hero-tag { font-size: 12px; color: #c8f060; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; }
  .hero-title { font-size: 36px; font-weight: 500; line-height: 1.15; letter-spacing: -0.5px; color: #f0ede4; margin-bottom: 12px; }
  .hero-sub { font-size: 15px; color: #6b6b67; line-height: 1.6; }
  .main { padding: 0 32px 48px; max-width: 720px; }
  .input-wrap { background: #161614; border: 0.5px solid #2a2a26; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
  .input-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 0.5px solid #1e1e1a; }
  .input-dot { width: 6px; height: 6px; border-radius: 50%; background: #2e2e2a; }
  .input-label { font-size: 11px; color: #444441; letter-spacing: 0.05em; text-transform: uppercase; }
  textarea { width: 100%; background: transparent; border: none; outline: none; padding: 16px; font-size: 14px; color: #d4d2c9; line-height: 1.7; min-height: 150px; resize: vertical; font-family: inherit; }
  textarea::placeholder { color: #3a3a36; }
  .actions { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .btn-main { display: inline-flex; align-items: center; gap: 7px; background: #c8f060; color: #0e0e0c; border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-main:hover { background: #d4f570; }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { display: inline-flex; align-items: center; background: transparent; color: #444441; border: 0.5px solid #2a2a26; border-radius: 8px; padding: 9px 16px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-ghost:hover { background: #161614; color: #6b6b67; }
  .divider { font-size: 11px; color: #2e2e2a; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: #1e1e1a; }
  .summary { display: flex; align-items: center; justify-content: space-between; background: #161614; border: 0.5px solid #2a2a26; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
  .summary-text { font-size: 13px; color: #6b6b67; }
  .summary-text strong { color: #d4d2c9; }
  .copy-btn { font-size: 12px; color: #444441; background: #1e1e1a; border: 0.5px solid #2a2a26; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: inherit; }
  .copy-btn:hover { color: #6b6b67; }
  .cards { display: flex; flex-direction: column; gap: 8px; }
  .card { background: #161614; border: 0.5px solid #2a2a26; border-radius: 10px; padding: 14px 16px; }
  .card-task { font-size: 14px; color: #d4d2c9; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 5px; display: inline-flex; align-items: center; gap: 4px; }
  .b-owner { background: #0c1a2e; color: #378add; border: 0.5px solid #0f2a4a; }
  .b-date { background: #1a150a; color: #ba7517; border: 0.5px solid #2a200a; }
  .b-high { background: #1e0a0a; color: #e24b4a; border: 0.5px solid #2e1010; }
  .b-med { background: #1a150a; color: #ba7517; border: 0.5px solid #2a200a; }
  .b-low { background: #0a1a0a; color: #639922; border: 0.5px solid #102a10; }
  .loading { display: none; align-items: center; gap: 10px; color: #444441; font-size: 14px; padding: 1rem 0; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #444441; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2}40%{opacity:1} }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 13L8 3L13 13M5.5 9h5" stroke="#0e0e0c" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
    <span class="logo-name">Actio</span>
    <span class="logo-badge">beta</span>
  </div>
</div>

<div class="hero">
  <div class="hero-tag">AI-powered</div>
  <div class="hero-title">Turn meetings into<br>clear action items</div>
  <div class="hero-sub">Paste any meeting transcript or notes. Actio extracts every task, assigns owners, and sets priorities.</div>
</div>

<div class="main">
  <div class="input-wrap">
    <div class="input-header">
      <div class="input-dot"></div>
      <div class="input-dot"></div>
      <div class="input-dot"></div>
      <span class="input-label">Transcript</span>
    </div>
    <textarea id="transcript" placeholder="Paste your meeting notes or transcript here..."></textarea>
  </div>

  <div class="actions">
    <button class="btn-main" id="extractBtn" onclick="extract()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5L8.5 5.5H12.5L9.5 8L10.5 12L7 9.5L3.5 12L4.5 8L1.5 5.5H5.5L7 1.5Z" fill="#0e0e0c"/></svg>
      Extract action items
    </button>
    <button class="btn-ghost" onclick="loadExample()">Load example</button>
  </div>

  <div id="loading" class="loading">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span>Extracting action items...</span>
  </div>

  <div id="results" style="display:none">
    <div class="divider">Results</div>
    <div id="results-inner"></div>
  </div>
</div>

<script>
const EXAMPLE = `Q3 planning call — June 24th

Attendees: Sarah (PM), John (Eng lead), Priya (Design), Marcus (Sales)

Sarah mentioned the onboarding flow still has a 40% drop-off and she'll own a fix — revised spec ready by next Wednesday.

John flagged the API rate limiting issue. He'll patch it this week and deploy by Thursday. He also needs to schedule a code review with the backend team before end of month.

Priya agreed to create an enterprise dashboard variant by July 5th.

Marcus will send a follow-up email to the three prospects from the London trip by tomorrow EOD. He'll also put together a competitive analysis doc by next Friday.

Sarah will set up a recurring Monday sync in the calendar this week.`;

function loadExample() {
  document.getElementById('transcript').value = EXAMPLE;
}

async function extract() {
  const text = document.getElementById('transcript').value.trim();
  if (!text) return;
  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('results').style.display = 'none';
  try {
    const res = await fetch('/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript: text })
    });
    const items = await res.json();
    renderResults(items);
  } catch(e) {
    document.getElementById('results-inner').innerHTML = `<p style="color:#e24b4a;font-size:14px">Something went wrong. Is the server running?</p>`;
    document.getElementById('results').style.display = 'block';
  } finally {
    btn.disabled = false;
    document.getElementById('loading').style.display = 'none';
  }
}

function renderResults(items) {
  const el = document.getElementById('results');
  const inner = document.getElementById('results-inner');
  if (!items.length) {
    inner.innerHTML = `<p style="color:#6b6b67;font-size:14px">No action items found. Try a more detailed transcript.</p>`;
    el.style.display = 'block'; return;
  }
  const high = items.filter(i => i.priority === 'high').length;
  const plain = items.map(i => `• ${i.task} — ${i.owner} (${i.deadline})`).join('\n');
  let html = `<div class="summary">
    <span class="summary-text"><strong>${items.length}</strong> action items${high ? ` · <span style="color:#e24b4a">${high} high priority</span>` : ''}</span>
    <button class="copy-btn" onclick="navigator.clipboard.writeText(${JSON.stringify(plain).replace(/'/g,"&#39;")})">Copy all</button>
  </div><div class="cards">`;
  items.forEach(i => {
    const pc = i.priority === 'high' ? 'b-high' : i.priority === 'medium' ? 'b-med' : 'b-low';
    html += `<div class="card">
      <div class="card-task">${i.task}</div>
      <div class="card-meta">
        <span class="badge b-owner">👤 ${i.owner}</span>
        <span class="badge b-date">📅 ${i.deadline}</span>
        <span class="badge ${pc}">${i.priority}</span>
      </div>
    </div>`;
  });
  html += '</div>';
  inner.innerHTML = html;
  el.style.display = 'block';
}
</script>
</body>
</html>
