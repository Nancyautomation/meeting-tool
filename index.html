<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meeting → Action items</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #6b6b67; margin-bottom: 1.5rem; }
  textarea { width: 100%; min-height: 190px; font-size: 14px; padding: 12px; border-radius: 8px; border: 1px solid #d3d1c7; background: #fff; color: #1a1a18; resize: vertical; font-family: inherit; line-height: 1.6; }
  textarea:focus { outline: none; border-color: #888780; }
  .row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  button { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 8px; border: 1px solid #d3d1c7; background: #fff; color: #1a1a18; font-size: 14px; cursor: pointer; font-family: inherit; }
  button:hover { background: #f1efe8; }
  button:active { transform: scale(0.98); }
  .btn-primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .link-btn { background: none; border: none; color: #185fa5; font-size: 13px; padding: 0; cursor: pointer; }
  .link-btn:hover { text-decoration: underline; background: none; transform: none; }
  .results { margin-top: 1.5rem; }
  .summary { background: #f1efe8; border-radius: 8px; padding: 12px 16px; margin-bottom: 1rem; font-size: 13px; color: #5f5e5a; display: flex; align-items: center; justify-content: space-between; }
  .card { background: #fff; border: 1px solid #e8e6de; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .task { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
  .meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; }
  .owner { background: #e6f1fb; color: #185fa5; }
  .deadline { background: #faeeda; color: #854f0b; }
  .high { background: #fcebeb; color: #a32d2d; }
  .medium { background: #faeeda; color: #854f0b; }
  .low { background: #eaf3de; color: #3b6d11; }
  .loading { display: none; align-items: center; gap: 10px; color: #6b6b67; font-size: 14px; padding: 1rem 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #888780; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2}40%{opacity:1} }
</style>
</head>
<body>
<div class="wrap">
  <h1>Meeting → Action items</h1>
  <p class="sub">Paste your meeting notes or transcript and get a clean list of action items.</p>

  <textarea id="transcript" placeholder="e.g. 'Sarah will follow up with the client by Friday. John needs to update the roadmap doc...'"></textarea>

  <div class="row">
    <button class="btn-primary" id="extractBtn" onclick="extract()">✦ Extract action items</button>
    <button class="link-btn" onclick="loadExample()">Load example</button>
  </div>

  <div id="loading" class="loading">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span>Extracting action items...</span>
  </div>

  <div id="results" class="results" style="display:none"></div>
</div>

<script>
const EXAMPLE = `Q3 planning call — June 24th

Attendees: Sarah (PM), John (Eng lead), Priya (Design), Marcus (Sales)

Sarah mentioned the onboarding flow still has a 40% drop-off and she'll own a fix — revised spec ready by next Wednesday.

John flagged the API rate limiting issue. He'll patch it this week and deploy by Thursday. He also needs to schedule a code review with the backend team before end of month.

Priya agreed to create an enterprise dashboard variant by July 5th.

Marcus will send a follow-up email to the three prospects from the London trip by tomorrow EOD. He'll also put together a competitive analysis doc by next Friday.

Sarah will set up a recurring Monday sync in the calendar this week.`;

function loadExample() {
  document.getElementById('transcript').value = EXAMPLE;
}

async function extract() {
  const text = document.getElementById('transcript').value.trim();
  if (!text) return;
  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('results').style.display = 'none';
  try {
    const url = window.location.protocol === 'file:' ? 'http://localhost:3000/extract' : '/extract';
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript: text })
    });
    if (!res.ok) {
      throw new Error(`Server responded ${res.status} ${res.statusText}`);
    }
    const items = await res.json();
    renderResults(items);
  } catch(e) {
    document.getElementById('results').innerHTML = `<p style="color:#a32d2d;font-size:14px">Something went wrong. ${e.message}</p>`;
    document.getElementById('results').style.display = 'block';
  } finally {
    btn.disabled = false;
    document.getElementById('loading').style.display = 'none';
  }
}

function renderResults(items) {
  const el = document.getElementById('results');
  if (!items.length) {
    el.innerHTML = `<p style="color:#6b6b67;font-size:14px">No action items found. Try a more detailed transcript.</p>`;
    el.style.display = 'block'; return;
  }
  const high = items.filter(i => i.priority === 'high').length;
  const plain = items.map(i => `• ${i.task} — ${i.owner} (${i.deadline})`).join('\n');
  let html = `<div class="summary">
    <span><strong>${items.length}</strong> action items${high ? ` · <span style="color:#a32d2d">${high} high priority</span>` : ''}</span>
    <button onclick="navigator.clipboard.writeText(${JSON.stringify(plain).replace(/'/g,"&#39;")})">Copy all</button>
  </div>`;
  items.forEach(i => {
    const pc = i.priority === 'high' ? 'high' : i.priority === 'medium' ? 'medium' : 'low';
    html += `<div class="card">
      <p class="task">${i.task}</p>
      <div class="meta">
        <span class="badge owner">👤 ${i.owner}</span>
        <span class="badge deadline">📅 ${i.deadline}</span>
        <span class="badge ${pc}">${i.priority} priority</span>
      </div>
    </div>`;
  });
  el.innerHTML = html;
  el.style.display = 'block';
}
</script>
</body>
</html>
